<!-- phone.html -->
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Télécommande</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
html,body{
  margin:0;
  width:100%;
  height:100%;
  background:#111;
  color:white;
  font-family:Arial,sans-serif;
}
.wrap{
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:20px;
}
button{
  width:90px;
  height:90px;
  font-size:38px;
  border:none;
  border-radius:20px;
  background:#222;
  color:white;
  box-shadow:0 0 10px rgba(255,255,255,.08);
}
button:active{
  transform:scale(.95);
  background:#00ff88;
  color:black;
}
.row{
  display:flex;
  gap:20px;
}
</style>
</head>
<body>

<div class="wrap">
  <button onclick="send('up')">⬆️</button>

  <div class="row">
    <button onclick="send('left')">⬅️</button>
    <button onclick="send('right')">➡️</button>
  </div>

  <button onclick="send('down')">⬇️</button>
</div>

<script>
const SUPABASE_URL = "https://kqhquyeeroskszhblsvq.supabase.co";
const SUPABASE_KEY = "sb_publishable_JMOdzvwVNDBTpHlqKy584Q_Z5SvuYmh";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const channel = client.channel("remote-control");

channel.subscribe();

function send(dir){
  channel.send({
    type:"broadcast",
    event:"move",
    payload:{dir}
  });
}
</script>

</body>
</html>
